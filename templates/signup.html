<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <title>Signup Form</title>
    <style>
        /* 🌐 Global Styles */
body {
    font-family: 'Poppins', Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
}

/* 📝 Form Container */
form {
    max-width: 400px;
    width: 100%;
    background: rgba(255, 255, 255, 0.7);
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    position: relative;
    overflow: hidden;
    z-index: 1;
}

/* 💫 Background Effects */
form::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 300%;
    height: 300%;
    background: radial-gradient(circle, #ffecd2, #fcb69f, #ff9a9e, #fad0c4);
    animation: rotate-bg 10s linear infinite;
    z-index: -1;
    opacity: 0.3;
}

@keyframes rotate-bg {
    0% {
        transform: rotate(0deg);
    }
    100% {
        transform: rotate(360deg);
    }
}

/* 🎨 Form Header */
h1 {
    margin-bottom: 20px;
    color: #333;
    font-size: 2rem;
    background: linear-gradient(45deg, #ff758c, #ff7eb3);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

/* 📄 Form Labels */
label {
    display: block;
    margin: 10px 0 5px;
    color: #555;
    font-weight: bold;
}

/* 🔳 Input Fields */
input[type="text"],
input[type="email"],
input[type="password"] {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 2px solid rgba(255, 255, 255, 0.5);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.2);
    color: #333;
    font-size: 16px;
    outline: none;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px);
}

input[type="text"]:focus,
input[type="email"]:focus,
input[type="password"]:focus {
    border-color: #ff758c;
    background: rgba(255, 255, 255, 0.6);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
}

/* 🚀 Submit Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #ff758c, #ff7eb3);
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(255, 94, 98, 0.4);
}

button:hover {
    background: linear-gradient(90deg, #ff7eb3, #ff758c);
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(255, 94, 98, 0.6);
}

/* 🔗 Links */
p a {
    color: #ff758c;
    text-decoration: none;
    font-weight: bold;
    transition: color 0.2s;
}

p a:hover {
    color: #ff7eb3;
    text-decoration: underline;
}

/* 🚦 Alert Messages */
.alert {
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 16px;
    animation: slide-down 0.5s ease, fade-out 5s ease forwards;
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    min-width: 300px;
    max-width: 90%;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    opacity: 0.9;
}

/* ❌ Error Message */
.alert-danger {
    background: linear-gradient(45deg, #f85032, #e73827);
    color: white;
    border: 1px solid #e73827;
}

/* ✅ Success Message */
.alert-success {
    background: linear-gradient(45deg, #56ab2f, #a8e063);
    color: white;
    border: 1px solid #56ab2f;
}

/* 🎞 Slide Down Animation */
@keyframes slide-down {
    0% {
        transform: translateY(-20px) translateX(-50%);
        opacity: 0;
    }
    100% {
        transform: translateY(0) translateX(-50%);
        opacity: 1;
    }
}

/* 🌫 Fade Out Animation */
@keyframes fade-out {
    0%, 90% {
        opacity: 1;
    }
    100% {
        opacity: 0;
    }
}

    </style>
</head>
<body>
    <form method="POST">
        <h1>Signup</h1>

        <!-- Flash Messages Display -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Signup Form Fields -->
        <label>Username</label>
        <input type="text" name="username" required>
        
        <label>Email</label>
        <input type="email" name="email" required>
        
        <label>Password</label>
        <input type="password" name="password" required>
        
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required>
        
        <button type="submit">Signup</button>
        
        <p><a href="{{ url_for('login') }}">Already have an account? Login here</a></p>
    </form>
</body>
</html>
